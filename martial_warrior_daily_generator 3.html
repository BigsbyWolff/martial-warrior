<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Martial Warrior Daily Generator</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src data: 'self'; connect-src 'none';">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0e;--bg2:#0f1116;--bg3:#161921;--bg4:#1c2028;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --red:#e53e2e;--red2:#ff7060;
  --amb:#f6a623;--amb2:#ffd080;
  --grn:#10b981;--grn2:#34d399;
  --pur:#8b5cf6;--pur2:#c4b5fd;
  --blu:#3b82f6;--blu2:#93c5fd;
  --tel:#14b8a6;--tel2:#5eead4;
  --tx:#e4e6ee;--tx2:#888fa0;--tx3:#4a5060;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:2px solid var(--red);padding:14px 16px 12px;position:sticky;top:0;z-index:200;-webkit-backdrop-filter:blur(12px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:22px;line-height:1}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.hdr-sub{font-size:10px;color:var(--tx3);letter-spacing:.5px}
.hdr-date-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:6px 10px;cursor:pointer;text-align:center;min-width:120px}
.hdr-date-display{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--amb2);letter-spacing:.3px}
.hdr-date-tap{font-size:9px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

/* ── NAV TABS ── */
.nav-tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:5px 10px;background:transparent;border:1px solid var(--bd);border-radius:4px;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.nav-btn:hover{color:var(--tx);border-color:var(--bd2)}
.nav-btn.active{background:var(--red);color:#fff;border-color:var(--red)}

/* ── DATE PICKER MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:14px;padding:20px;width:min(340px,92vw);max-height:85vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--amb2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;line-height:1;padding:0 2px}
.modal-close:hover{color:var(--tx)}
.date-input{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:15px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:12px}
.date-input:focus{border-color:var(--amb)}
.modal-go{width:100%;background:var(--red);border:none;border-radius:8px;padding:11px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer}
.modal-go:hover{background:var(--red2)}
.today-btn{width:100%;background:transparent;border:1px solid var(--bd2);border-radius:8px;padding:9px;color:var(--tel2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;margin-bottom:10px}
.today-btn:hover{border-color:var(--tel);background:rgba(20,184,166,0.07)}
.range-note{font-size:11px;color:var(--tx3);text-align:center;margin-top:8px}

/* ── MAIN CONTENT ── */
.cnt{padding:16px;max-width:700px;margin:0 auto}
.tab-pane{display:none}.tab-pane.active{display:block}

/* ── TODAY CARD ── */
.today-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:14px}
.today-card.type-cal{border-top:3px solid var(--grn)}
.today-card.type-eq{border-top:3px solid var(--amb)}
.today-card.type-rest{border-top:3px solid var(--tx3)}
.today-card.type-deload{border-top:3px solid var(--blu2)}
.today-card.type-benchmark{border-top:3px solid var(--pur2)}

.card-hero{padding:14px 16px 12px;border-bottom:1px solid var(--bd)}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.card-weekday{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3)}
.card-date{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--tx2)}
.type-badge{font-family:'Barlow Condensed',sans-serif;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.badge-CAL{background:rgba(16,185,129,0.2);color:var(--grn2)}
.badge-EQ{background:rgba(246,166,35,0.2);color:var(--amb2)}
.badge-REST{background:rgba(255,255,255,0.07);color:var(--tx3)}
.badge-DELOAD{background:rgba(59,130,246,0.18);color:var(--blu2)}
.badge-TEST{background:rgba(139,92,246,0.2);color:var(--pur2)}
.card-session-name{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;line-height:1.1}
.type-cal .card-session-name{color:var(--grn2)}
.type-eq .card-session-name{color:var(--amb2)}
.type-rest .card-session-name,.type-deload .card-session-name{color:var(--tx)}
.type-benchmark .card-session-name{color:var(--pur2)}
.card-context{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.ctx-pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--tx2);background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;white-space:nowrap}
.ctx-pill span{font-weight:600;color:var(--tx)}

/* ── EXERCISE LIST ── */
.ex-section{padding:14px 16px}
.ex-section-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.ex-section-title::before{content:'';display:inline-block;width:3px;height:11px;border-radius:2px}
.section-warmup .ex-section-title::before{background:var(--blu2)}
.section-main .ex-section-title::before{background:var(--grn2)}
.section-stretch .ex-section-title::before{background:var(--tel2)}
.section-cooldown .ex-section-title::before{background:var(--pur2)}
.section-benchmark .ex-section-title::before{background:var(--pur2)}
.section-recovery .ex-section-title::before{background:var(--tx3)}

.ex-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.ex-item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 10px;border-radius:6px;gap:10px;transition:background .1s}
.ex-item:hover{background:var(--bg3)}
.ex-item.is-stretch{background:rgba(20,184,166,0.04)}
.ex-item.is-stretch:hover{background:rgba(20,184,166,0.09)}
.ex-item.is-benchmark{background:rgba(139,92,246,0.06)}
.ex-name{flex:1;font-size:13px;color:var(--tx);line-height:1.45}
.ex-tag{font-size:8.5px;font-weight:700;padding:1px 4px;border-radius:2px;text-transform:uppercase;letter-spacing:.3px;margin-left:4px;vertical-align:middle}
.tag-stretch{background:rgba(20,184,166,0.18);color:var(--tel2)}
.tag-ma{background:rgba(229,62,46,0.15);color:#ff8a7e}
.tag-bjj{background:rgba(59,130,246,0.15);color:var(--blu2)}
.tag-new{background:rgba(246,166,35,0.15);color:var(--amb2)}
.ex-reps{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--amb2);white-space:nowrap;letter-spacing:.3px;flex-shrink:0}
.ex-reps.eq{color:var(--tel2)}
.ex-reps.stretch{color:var(--tel2)}

/* ── SECTION DIVIDERS ── */
.sect-divider{height:1px;background:var(--bd);margin:0 16px}

/* ── TIMER ── */
.timer-section{padding:12px 16px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.timer-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3)}
.timer-display{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--tx);letter-spacing:1px;min-width:90px;text-align:center}
.timer-controls{display:flex;gap:6px}
.timer-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--bd2);border-radius:6px;cursor:pointer;background:transparent;color:var(--tx);transition:all .12s}
.timer-btn:hover{background:var(--bg4)}
.timer-btn.start{background:var(--grn);border-color:var(--grn);color:#000}
.timer-btn.stop{background:var(--red);border-color:var(--red);color:#fff}
.timer-btn.reset{color:var(--tx2)}

/* ── MAT ROUTINES ── */
.mat-section{padding:14px 16px;border-top:1px solid var(--bd)}
.mat-block{background:var(--bg3);border-radius:9px;padding:11px 13px;margin-bottom:8px}
.mat-block:last-child{margin-bottom:0}
.mat-block-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.mat-block-title.morning{color:var(--amb2)}
.mat-block-title.evening{color:var(--blu2)}
.mat-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;border-bottom:1px solid var(--bd);font-size:12px;line-height:1.45}
.mat-item:last-child{border-bottom:none}
.mat-time{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--tel2);min-width:40px;padding-top:1px}
.mat-body{flex:1;color:var(--tx2)}.mat-body strong{color:var(--tx);font-weight:600}
.mat-new{font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;text-transform:uppercase;background:rgba(246,166,35,0.15);color:var(--amb2);margin-left:4px}

/* ── NUTRITION CARD ── */
.nutrition-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:14px}
.nutrition-head{padding:12px 15px;border-bottom:1px solid var(--bd);background:var(--bg3);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.nutrition-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--amb2)}
.macro-pills{display:flex;gap:5px;flex-wrap:wrap}
.macro-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap}
.mp-p{background:rgba(229,62,46,0.15);color:#ff8a7e;border:1px solid rgba(229,62,46,0.2)}
.mp-c{background:rgba(59,130,246,0.15);color:var(--blu2);border:1px solid rgba(59,130,246,0.2)}
.mp-k{background:rgba(16,185,129,0.15);color:var(--grn2);border:1px solid rgba(16,185,129,0.2)}
.meal-row{display:flex;gap:10px;padding:8px 15px;border-bottom:1px solid var(--bd);font-size:12.5px;line-height:1.55}
.meal-row:last-child{border-bottom:none}
.meal-time{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--amb);min-width:62px;padding-top:1px;letter-spacing:.2px;flex-shrink:0}
.meal-body{flex:1;color:var(--tx2)}.meal-body strong{color:var(--tx);font-weight:600}
.meal-badge{display:inline-flex;font-size:8.5px;font-weight:700;padding:1px 4px;border-radius:2px;text-transform:uppercase;letter-spacing:.3px;margin-left:3px;vertical-align:middle}
.mb-p{background:rgba(229,62,46,0.15);color:#ff8a7e}
.mb-c{background:rgba(59,130,246,0.15);color:var(--blu2)}
.mb-m{background:rgba(16,185,129,0.15);color:var(--grn2)}

/* ── STRETCH PANEL ── */
.stretch-panel{background:var(--bg2);border:1px solid rgba(20,184,166,0.2);border-radius:12px;overflow:hidden;margin-bottom:14px}
.stretch-head{padding:11px 14px;border-bottom:1px solid var(--bd);background:rgba(20,184,166,0.05);display:flex;align-items:center;justify-content:space-between}
.stretch-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--tel2)}
.stretch-count{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--tx3)}
.stretch-item{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd);font-size:12.5px;line-height:1.5}
.stretch-item:last-child{border-bottom:none}
.stretch-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.stretch-info{flex:1}
.stretch-name{font-weight:600;color:var(--tx);margin-bottom:1px}
.stretch-detail{font-size:11.5px;color:var(--tx2)}
.stretch-hold{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--tel2);white-space:nowrap;flex-shrink:0;padding-top:2px}

/* ── YOGA PANEL ── */
.yoga-panel{background:var(--bg2);border:1px solid rgba(139,92,246,0.2);border-radius:12px;overflow:hidden;margin-bottom:14px}
.yoga-head{padding:11px 14px;border-bottom:1px solid var(--bd);background:rgba(139,92,246,0.05)}
.yoga-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--pur2)}
.yoga-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.yoga-item{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd);font-size:12px}
.yoga-item:last-child{border-bottom:none}
.yoga-num{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--bd2);min-width:22px;padding-top:1px}
.yoga-name{flex:1;color:var(--tx);line-height:1.4}
.yoga-time{font-family:'Barlow Condensed',sans-serif;font-size:11.5px;font-weight:700;color:var(--pur2);white-space:nowrap;flex-shrink:0}

/* ── PHYSIQUE PANEL ── */
.physique-panel{background:var(--bg2);border:1px solid rgba(246,166,35,0.2);border-radius:12px;overflow:hidden;margin-bottom:14px}
.physique-head{padding:11px 14px;border-bottom:1px solid var(--bd);background:rgba(246,166,35,0.04)}
.physique-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--amb2)}
.physique-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
.physique-stat{background:var(--bg3);border-radius:7px;padding:9px 11px}
.ps-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.ps-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--amb2);line-height:1}
.ps-sub{font-size:10px;color:var(--tx3);margin-top:2px}

/* ── CRAMP EMERGENCY ── */
.cramp-panel{background:rgba(229,62,46,0.05);border:1px solid rgba(229,62,46,0.2);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.cramp-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--red2);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.cramp-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(229,62,46,0.1);font-size:12px;line-height:1.5}
.cramp-item:last-child{border-bottom:none}
.cramp-region{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--red2);min-width:90px;letter-spacing:.3px;padding-top:1px}
.cramp-fix{flex:1;color:var(--tx2)}.cramp-fix strong{color:var(--tx)}

/* ── WEEK MINI CALENDAR ── */
.week-strip{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.week-strip-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{border-radius:6px;padding:6px 4px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .12s}
.wday:hover{border-color:var(--bd2)}
.wday.is-today{border-color:var(--amb);background:rgba(246,166,35,0.08)}
.wday.is-cal{background:rgba(16,185,129,0.08)}
.wday.is-eq{background:rgba(246,166,35,0.06)}
.wday.is-rest{background:var(--bg3)}
.wday.is-deload{background:rgba(59,130,246,0.06)}
.wday.is-benchmark{background:rgba(139,92,246,0.08)}
.wday-name{font-family:'Barlow Condensed',sans-serif;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);margin-bottom:2px}
.wday-num{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--tx2);line-height:1}
.wday.is-today .wday-num{color:var(--amb2)}
.wday.is-cal .wday-num{color:var(--grn2)}
.wday.is-eq .wday-num{color:var(--amb2)}
.wday.is-benchmark .wday-num{color:var(--pur2)}
.wday-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.wday.is-cal .wday-badge{color:var(--grn2)}
.wday.is-eq .wday-badge{color:var(--amb)}
.wday.is-rest .wday-badge{color:var(--tx3)}
.wday.is-deload .wday-badge{color:var(--blu2)}

/* ── PROGRESS ── */
.progress-bar{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--grn),var(--tel));transition:width .4s ease}
.progress-label{font-size:10px;color:var(--tx3);margin-top:3px}

/* ── EMPTY / OUT OF RANGE ── */
.out-of-range{text-align:center;padding:40px 20px;color:var(--tx3)}
.out-of-range h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.out-of-range p{font-size:13px;line-height:1.6}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .hdr{padding:10px 12px 10px}
  .hdr-title{font-size:17px}
  .cnt{padding:12px}
  .card-session-name{font-size:20px}
}
</style>
</head>
<body>

<!-- DATE PICKER MODAL -->
<div class="modal-bg" id="datePicker">
  <div class="modal">
    <div class="modal-title">
      Pick a date
      <button class="modal-close" onclick="closePicker()">×</button>
    </div>
    <button class="today-btn" onclick="goToday()">Jump to Today</button>
    <input type="date" class="date-input" id="dateInput"
           min="2025-12-01" max="2026-12-01"
           onchange="goToDate(this.value)">
    <div class="range-note">Program runs Dec 1, 2025 → Dec 1, 2026</div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-brand">
      <span class="hdr-icon">⚔</span>
      <div>
        <div class="hdr-title">Martial Warrior</div>

const START = new Date('2025-12-01T00:00:00');
const END   = new Date('2026-12-01T00:00:00');

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentDate = null;
let timerInterval = null;
let timerSecs = 0;
let timerRunning = false;
let _renderedTabs = {};   // lazy-render cache: track which tabs are current
let _activeTab = 'session';

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  try {
    const today = getToday();
    const initial = META[today] ? today : '2025-12-01';
    setDate(initial);
  } catch(e) {
    console.error('Init error:', e);
  }
});

function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function isInRange(iso) {
  if (!iso || typeof iso !== 'string') return false;
  const d = new Date(iso + 'T00:00:00');
  return !isNaN(d) && d >= START && d <= END;
}

// ─── DATE MANAGEMENT ─────────────────────────────────────────────────────────
function setDate(iso) {
  if (!iso) return;
  currentDate = iso;
  _renderedTabs = {};  // invalidate all tab renders

  const inp = document.getElementById('dateInput');
  if (inp) inp.value = iso;

  const meta = META[iso];
  if (!meta) {
    const hdr = document.getElementById('hdrDateDisplay');
    if (hdr) hdr.textContent = iso;
    showOutOfRange();
    return;
  }

  try {
    const d = new Date(iso + 'T00:00:00');
    const shortDate = d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'});
    const hdr = document.getElementById('hdrDateDisplay');
    if (hdr) hdr.textContent = meta.weekday.slice(0,3).toUpperCase() + ' · ' + shortDate;
  } catch(e) { /* date display non-critical */ }

  renderActiveTab();
}

function showOutOfRange() {
  const msg = '<div class="out-of-range"><h2>Out of Range</h2><p>This date is outside the program window.<br>Dec 1, 2025 – Dec 1, 2026</p></div>';
  ['session','mat','stretches','yoga','nutrition','physique','week'].forEach(t => {
    const el = document.getElementById(t + 'Content');
    if (el) el.innerHTML = msg;
  });
}

function openPicker() {
  const el = document.getElementById('datePicker');
  if (el) el.classList.add('open');
}
function closePicker() {
  const el = document.getElementById('datePicker');
  if (el) el.classList.remove('open');
}
function goToday() {
  const today = getToday();
  setDate(isInRange(today) ? today : '2025-12-01');
  closePicker();
}
function goToDate(iso) {
  if (iso) { setDate(iso); closePicker(); }
}

// Click outside modal to close
(function() {
  const picker = document.getElementById('datePicker');
  if (picker) picker.addEventListener('click', function(e) {
    if (e.target === this) closePicker();
  });
})();

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function showTab(name, btn) {
  try {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const pane = document.getElementById('tab-' + name);
    if (pane) pane.classList.add('active');
    if (btn) btn.classList.add('active');
    _activeTab = name;
    // Lazy render: only render this tab if not already current
    if (!_renderedTabs[name]) renderTab(name);
  } catch(e) {
    console.error('Tab error:', e);
  }
}

function renderActiveTab() {
  renderTab(_activeTab);
}

function renderTab(name) {
  const meta = META[currentDate];
  if (!meta) return;
  const day = DAYS[meta.idx];
  if (!day) return;

  try {
    switch(name) {
      case 'session':    renderSession(day, meta); break;
      case 'mat':        renderMat(meta); break;
      case 'stretches':  renderStretches(day, meta); break;
      case 'yoga':       renderYoga(meta); break;
      case 'nutrition':  renderNutrition(day, meta); break;
      case 'physique':   renderPhysique(meta); break;
      case 'week':       renderWeek(meta); break;
    }
    _renderedTabs[name] = true;
  } catch(e) {
    console.error('Render error for tab ' + name + ':', e);
    const el = document.getElementById(name === 'session' ? 'sessionContent' :
               name === 'mat' ? 'matContent' :
               name === 'stretches' ? 'stretchContent' :
               name === 'yoga' ? 'yogaContent' :
               name === 'nutrition' ? 'nutritionContent' :
               name === 'physique' ? 'physiqueContent' : 'weekContent');
    if (el) el.innerHTML = '<div style="padding:20px;color:var(--tx2)">Unable to display this tab. Try selecting a different date.</div>';
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function dayTypeClass(badge) {
  const m = {CAL:'cal', EQ:'eq', REST:'rest', DELOAD:'deload', TEST:'benchmark'};
  return 'type-' + (m[badge] || 'rest');
}
function dayProgress(meta) {
  return Math.round(((meta.idx || 0) / 365) * 100);
}
function getQuarterTargets(q) {
  const targets = [
    {protein:'240g', cal_train:'2,900', cal_rest:'2,400', wt:'248–255 lbs', bf:'16–18%'},
    {protein:'245g', cal_train:'2,900', cal_rest:'2,400', wt:'243–250 lbs', bf:'14–16%'},
    {protein:'250g', cal_train:'3,200', cal_rest:'2,400', wt:'240–248 lbs', bf:'12–14%'},
    {protein:'252g', cal_train:'3,200', cal_rest:'2,400', wt:'245–265 lbs', bf:'10–14%'},
  ];
  return targets[(q || 1) - 1] || targets[0];
}

// Cache categorized exercises per day index to avoid re-processing
const _catCache = {};
function categorizeExercises(exArr, idx) {
  if (_catCache[idx]) return _catCache[idx];
  const warmup = [], main = [], stretch = [], cooldown = [];

  (exArr || []).forEach((ex, i) => {
    if (!ex || !ex.n) return;
    const n = ex.n.toLowerCase();
    const total = exArr.length;
    const isStretch = n.includes('stretch') || n.includes('cobra') || n.includes('jefferson') ||
                      n.includes('hamstring') || n.includes('belly breathing') || n.includes('leg swing') ||
                      n.includes('nerve floss') || n.includes('side bend') ||
                      n.includes('child') || n.includes('pigeon') ||
                      n.includes('hip flexor') || n.includes('spinal twist');
    const isWarmup = (i === 0) || n.includes('warmup') || n.includes('warm-up') ||
                     n.includes('joint circle') || n.includes('ankle') || n.includes('club warm') ||
                     n.includes('leg swing') || n.includes('belly breath');
    const isCool = n.includes('cooldown') || n.includes('cool-down') ||
                   n.includes('jefferson') || n.includes('cobra') ||
                   (isStretch && i > total * 0.55);

    if (isWarmup && warmup.length < 5) { warmup.push(ex); }
    else if (isCool) { cooldown.push(ex); }
    else if (isStretch) { stretch.push(ex); }
    else { main.push(ex); }
  });

  const result = {warmup, main, stretch, cooldown};
  _catCache[idx] = result;
  return result;
}

function esc(str) {
  // Full HTML content escape
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function escAttr(str) {
  // Safe for use inside attribute values (href, onclick, class, style, etc.)
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
function escIso(str) {
  // Validate ISO date format YYYY-MM-DD before use in onclick/data attrs
  if (typeof str !== 'string') return '';
  return /^\d{4}-\d{2}-\d{2}$/.test(str) ? str : '';
}

function exItemHTML(ex, repsClass) {
  if (!ex || !ex.n) return '';
  const n = ex.n;
  const isStretch = n.includes('STRETCH');
  const isWC = n.includes('WC') || n.includes('Siu Nim') || n.includes('Chum Kiu') ||
               n.includes('Biu Jee') || n.includes('chain punch') || n.includes('horse stance');
  const isBJJ = n.includes('BJJ') || n.includes('shrimping') || n.includes('granby') ||
                n.includes('stand-up') || n.includes('guard') || n.includes('hip escape');

  const cleanName = esc(n.replace(/ STRETCH/g, '').trim());
  let tags = '';
  if (isStretch) tags += '<span class="ex-tag tag-stretch">Stretch</span>';
  if (isWC)      tags += '<span class="ex-tag tag-ma">WC</span>';
  if (isBJJ)     tags += '<span class="ex-tag tag-bjj">BJJ</span>';

  const cls = isStretch ? 'ex-item is-stretch' : 'ex-item';
  const rc  = isStretch ? 'ex-reps stretch' : ('ex-reps ' + (repsClass || ''));
  return `<li class="${cls}"><span class="ex-name">${cleanName}${tags}</span><span class="${rc}">${esc(ex.r)}</span></li>`;
}

// ─── SESSION TAB ─────────────────────────────────────────────────────────────
function renderSession(day, meta) {
  if (!day || !meta) return;

  if (warmup.length) {
    parts.push(`<div class="sect-divider"></div>
    <div class="ex-section section-warmup">
      <div class="ex-section-title">Warm-Up</div>
      <ul class="ex-list">${warmup.map(e => exItemHTML(e, '')).join('')}</ul>
    </div>`);
  }
  if (main.length) {
    const sClass = isBench ? 'section-benchmark' : isRest ? 'section-recovery' : 'section-main';
    const sTitle = isBench ? 'Benchmark Tests' : isRest ? 'Recovery Activities' : 'Main Session';
    parts.push(`<div class="sect-divider"></div>

      <div class="ex-section-title">Mid-Session Stretches</div>
      <ul class="ex-list">${stretch.map(e => exItemHTML(e, 'stretch')).join('')}</ul>

  if (cooldown.length) {
    parts.push(`<div class="sect-divider"></div>
    <div class="ex-section section-cooldown">
      <div class="ex-section-title">Cooldown + Anti-Cramp Stretches</div>
      <ul class="ex-list">${cooldown.map(e => exItemHTML(e, 'stretch')).join('')}</ul>
    </div>`);
  }
  parts.push('</div>');

  const el = document.getElementById('sessionContent');
  if (el) el.innerHTML = parts.join('');
  timerReset();
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function timerToggle() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    const btn = document.getElementById('timerStartBtn');
    if (btn) { btn.textContent = 'Resume'; btn.className = 'timer-btn start'; }
  } else {
    timerRunning = true;
    const btn = document.getElementById('timerStartBtn');
    if (btn) { btn.textContent = 'Pause'; btn.className = 'timer-btn stop'; }
    timerInterval = setInterval(function() {
      timerSecs++;
      const h = Math.floor(timerSecs / 3600);
      const m = Math.floor((timerSecs % 3600) / 60);
      const s = timerSecs % 60;
      const disp = document.getElementById('timerDisplay');
      if (disp) disp.textContent = h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }, 1000);
  }
}
function timerReset() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
  timerSecs = 0;
  const btn = document.getElementById('timerStartBtn');
  if (btn) { btn.textContent = 'Start'; btn.className = 'timer-btn start'; }
  const disp = document.getElementById('timerDisplay');
  if (disp) disp.textContent = '0:00:00';
}

    <div style="font-size:11px;color:var(--tx2);margin-top:3px">Myles Garrett (272 lbs @11% BF) + Anthony Joshua (247 lbs @9% BF) scaled to 6'2" frame</div>
  </div>
  <div class="physique-grid">
    <div class="physique-stat"><div class="ps-label">Target weight</div><div class="ps-val">${qt.wt}</div></div>
    <div class="physique-stat"><div class="ps-label">Est. body fat</div><div class="ps-val">${qt.bf}</div></div>
    <div class="physique-stat"><div class="ps-label">Daily protein</div><div class="ps-val">${qt.protein}</div><div class="ps-sub">Spread over 5 feedings</div></div>
    <div class="physique-stat"><div class="ps-label">Year progress</div><div class="ps-val">${prog}%</div><div class="ps-sub">Day ${meta.idx + 1} of 366</div></div>
  </div></div>
  <div style="background:var(--bg2);border:1px solid rgba(246,166,35,0.2);border-radius:12px;overflow:hidden;margin-bottom:14px">
  <div style="padding:11px 14px;border-bottom:1px solid var(--bd);background:rgba(246,166,35,0.04)">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;color:var(--amb2)">Myles Garrett Markers</div>
    <div style="font-size:11px;color:var(--tx2);margin-top:2px">6'4" · 272 lbs · ~11% BF · Power-endurance hybrid</div>
  </div>${garrett.map(([t,e]) => `<div class="meal-row"><span class="meal-time" style="color:var(--amb);min-width:130px">${esc(t)}</span><div class="meal-body" style="color:var(--tx2)">${esc(e)}</div></div>`).join('')}</div>
  <div style="background:var(--bg2);border:1px solid rgba(139,92,246,0.2);border-radius:12px;overflow:hidden;margin-bottom:14px">
  <div style="padding:11px 14px;border-bottom:1px solid var(--bd);background:rgba(139,92,246,0.04)">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;text-transform:uppercase;color:var(--pur2)">Anthony Joshua Markers</div>
    <div style="font-size:11px;color:var(--tx2);margin-top:2px">6'6" · 247 lbs · ~9% BF · Muscular endurance + explosive power</div>
  </div>${joshua.map(([t,e]) => `<div class="meal-row"><span class="meal-time" style="color:var(--pur2);min-width:130px">${esc(t)}</span><div class="meal-body" style="color:var(--tx2)">${esc(e)}</div></div>`).join('')}</div>
  <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px">
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px">Weekly tracking checklist</div>
  <div class="meal-row" style="padding:5px 0"><span class="meal-time" style="color:var(--grn2)">Monday AM</span><div class="meal-body">Body weight — same scale, same time, before food or water</div></div>
  <div class="meal-row" style="padding:5px 0"><span class="meal-time" style="color:var(--amb2)">Every 2 wks</span><div class="meal-body">Waist circumference at navel — relaxed, not sucked in</div></div>
  <div class="meal-row" style="padding:5px 0"><span class="meal-time" style="color:var(--pur2)">Monthly</span><div class="meal-body">Front + side + back photos — same time, same lighting, same location</div></div>
  <div class="meal-row" style="padding:5px 0;border-bottom:none"><span class="meal-time" style="color:var(--tel2)">Quarterly</span><div class="meal-body">Performance benchmarks: max push-ups · plank hold · KB snatch test · barbell RDL 5RM · belt squat 10RM</div></div>
  </div>`;
}

// ─── WEEK TAB ─────────────────────────────────────────────────────────────────
function renderWeek(meta) {
  if (!meta) return;
  const d = new Date(currentDate + 'T00:00:00');
  const dow = d.getDay();
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(d);
  monday.setDate(d.getDate() + mondayOffset);

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const wd = new Date(monday);
    wd.setDate(monday.getDate() + i);
    weekDays.push(wd.toISOString().slice(0, 10));
  }
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const badgeColors = {CAL:'var(--grn2)', EQ:'var(--amb2)', REST:'var(--tx3)', DELOAD:'var(--blu2)', TEST:'var(--pur2)'};

  const stripDays = weekDays.map((iso, i) => {
    const wm = META[iso];
    if (!wm) {
      const dayNum = new Date(iso + 'T00:00:00').getDate();
      const safeIso1 = escIso(iso);
      return `<div class="wday is-rest" data-date="${safeIso1}"><div class="wday-name">${dayNames[i]}</div><div class="wday-num" style="color:var(--tx3)">${dayNum}</div><div class="wday-badge" style="color:var(--tx3)">—</div></div>`;
    }
    const wd = DAYS[wm.idx];
    if (!wd) return '';
    const badgeCls = {CAL:'is-cal', EQ:'is-eq', REST:'is-rest', DELOAD:'is-deload', TEST:'is-benchmark'}[wd.badge] || 'is-rest';
    const isToday = iso === currentDate;
    const dayNum = new Date(iso + 'T00:00:00').getDate();
    const safeIso2 = escIso(iso);
    return `<div class="wday ${badgeCls}${isToday ? ' is-today' : ''}" data-date="${safeIso2}"><div class="wday-name">${dayNames[i]}</div><div class="wday-num">${dayNum}</div><div class="wday-badge">${esc(wd.badge)}</div></div>`;
  }).join('');

  const listRows = weekDays.map((iso, i) => {
    const wm = META[iso];
    if (!wm) return '';
    const wd = DAYS[wm.idx];
    if (!wd) return '';
    const isToday = iso === currentDate;
    const bc = badgeColors[wd.badge] || 'var(--tx3)';
    const dateLabel = (wm.display || '').split(',')[0];
    const safeIso3 = escIso(iso);
    return `<div data-date="${safeIso3}" style="display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--bd);cursor:pointer;${isToday ? 'background:var(--bg3);' : ''}">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:${isToday ? 'var(--amb2)' : 'var(--tx3)'};min-width:26px">${dayNames[i]}</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:${bc};min-width:40px">${esc(wd.badge)}</div>
      <div style="flex:1;font-size:12.5px;color:${isToday ? 'var(--tx)' : 'var(--tx2)'};font-weight:${isToday ? '600' : '400'}">${esc(wd.name)}</div>
      <div style="font-size:10px;color:var(--tx3)">${esc(dateLabel)}</div>
    </div>`;
  }).join('');

  const prevIso = (() => { const pd = new Date(currentDate + 'T00:00:00'); pd.setDate(pd.getDate()-1); return pd.toISOString().slice(0,10); })();
  const nextIso = (() => { const nd = new Date(currentDate + 'T00:00:00'); nd.setDate(nd.getDate()+1); return nd.toISOString().slice(0,10); })();

  const el = document.getElementById('weekContent');
  if (!el) return;
  el.innerHTML = `<div class="week-strip">
  <div class="week-strip-title">Week ${meta.week} — ${esc(meta.yoga)} Phase · Q${meta.quarter}</div>
  <div class="week-days">${stripDays}</div></div>
  <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden">${listRows}</div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button data-date="${escIso(prevIso)}" class="nav-day-btn" style="flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer">← Previous Day</button>
    <button data-date="${escIso(nextIso)}" class="nav-day-btn" style="flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx2);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer">Next Day →</button>
  </div>`;

  // Delegated click handler after DOM is set — handles wday chips, list rows, prev/next buttons
  el.addEventListener('click', function(e) {
    const target = e.target.closest('[data-date]');
    if (!target) return;
    const iso = escIso(target.dataset.date);
    if (iso && META[iso]) setDate(iso);
  });
}

</script>
